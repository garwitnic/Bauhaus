        const titleEl = document.getElementById("page-title");
        const imageWrapper = document.getElementById("image-wrapper");
        const imageEl = document.getElementById("topic-image");
        const imageCaptionEl = document.getElementById("image-caption");
        const partNavEl = document.getElementById("part-nav");
        const infoContentEl = document.getElementById("info-content");
        const topicLinks = document.querySelectorAll(".page-nav .nav-link");

        let currentTopic = null;

        function setActiveTopicLink(topicKey) {
            topicLinks.forEach((link) => {
                link.classList.toggle("nav-link-active", link.getAttribute("data-topic") === topicKey);
            });
        }

        function setActivePartButton(partId) {
            const partButtons = partNavEl.querySelectorAll(".part-btn");
            partButtons.forEach((button) => {
                button.classList.toggle("part-btn-active", button.getAttribute("data-part") === partId);
            });
        }

        function withoutDescriptionHeadings(html) {
            return html.replace(/<h3>[\s\S]*?<\/h3>\s*/g, "");
        }

        function syncImageCaption(topic) {
            imageCaptionEl.textContent = topic.objectName || "";
            imageCaptionEl.classList.toggle("image-caption-hidden", Boolean(topic.hideImageCaption));
        }

        function showIntro(topic) {
            imageEl.src = topic.image;
            imageEl.alt = topic.imageAlt;
            syncImageCaption(topic);
            renderHotspots(topic);
            infoContentEl.innerHTML = withoutDescriptionHeadings(topic.introHtml);
            setActivePartButton("erklaerung");
        }

        function showPart(topic, partId) {
            const part = topic.parts.find((item) => item.id === partId);
            if (!part) {
                return;
            }

            imageEl.src = topic.image;
            imageEl.alt = topic.imageAlt;
            syncImageCaption(topic);
            renderHotspots(topic);
            infoContentEl.innerHTML = withoutDescriptionHeadings(part.content);
            setActivePartButton(part.id);
        }

        function showComparison(topic) {
            imageEl.src = topic.compareImage;
            imageEl.alt = topic.compareImageAlt || topic.imageAlt;
            imageCaptionEl.classList.add("image-caption-hidden");
            imageWrapper.querySelectorAll(".hotspot").forEach((node) => node.remove());
            infoContentEl.innerHTML = withoutDescriptionHeadings(topic.compareHtml);
            setActivePartButton("vergleich");
        }

        function createHotspot(part, zone) {
            const hotspot = document.createElement("div");
            hotspot.className = "hotspot";
            hotspot.dataset.part = part.id;
            hotspot.title = `${part.label} anklicken`;
            hotspot.style.top = zone.top;
            hotspot.style.left = zone.left;
            hotspot.style.width = zone.width;
            hotspot.style.height = zone.height;
            if (zone.borderRadius) {
                hotspot.style.borderRadius = zone.borderRadius;
            }
            hotspot.addEventListener("click", () => showPart(currentTopic, part.id));
            return hotspot;
        }

        function renderHotspots(topic) {
            imageWrapper.querySelectorAll(".hotspot").forEach((node) => node.remove());
            return;
        }

        function renderTopic(topicKey) {
            const topic = topics[topicKey] || topics.einfuehrung;
            currentTopic = topic;

            document.documentElement.style.setProperty("--image-max-width", topic.imageWidth);
            titleEl.textContent = topic.isIntro ? topic.coreQuestion : `Kernfrage: ${topic.coreQuestion}`;
            imageEl.src = topic.image;
            imageEl.alt = topic.imageAlt;
            setActiveTopicLink(topicKey);

            partNavEl.innerHTML = "";

            const introButton = document.createElement("button");
            introButton.type = "button";
            introButton.className = "part-btn";
            introButton.dataset.part = "erklaerung";
            introButton.textContent = "Erklärung";
            introButton.addEventListener("click", () => showIntro(topic));
            partNavEl.appendChild(introButton);

            topic.parts.forEach((part) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "part-btn";
                button.dataset.part = part.id;
                button.textContent = part.label;
                button.addEventListener("click", () => showPart(topic, part.id));
                partNavEl.appendChild(button);
            });

            if (topic.compareHtml) {
                const compareButton = document.createElement("button");
                compareButton.type = "button";
                compareButton.className = "part-btn";
                compareButton.dataset.part = "vergleich";
                compareButton.textContent = "Vergleich";
                compareButton.addEventListener("click", () => showComparison(topic));
                partNavEl.appendChild(compareButton);
            }

            showIntro(topic);
        }

        function topicFromHash() {
            const key = window.location.hash.replace("#", "");
            return topics[key] ? key : "einfuehrung";
        }

        topicLinks.forEach((link) => {
            link.addEventListener("click", (event) => {
                event.preventDefault();
                const topicKey = link.getAttribute("data-topic");
                window.location.hash = topicKey;
            });
        });

        window.addEventListener("hashchange", () => {
            renderTopic(topicFromHash());
        });

        renderTopic(topicFromHash());
    </script>
